version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bigchat
      POSTGRES_USER: ${DATABASE_USER:-bigchat}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-bigchat}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-bigchat}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/bigchat
      DATABASE_USER: ${DATABASE_USER:-bigchat}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-bigchat}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production-32chars}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
