spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/bigchat}
    username: ${DATABASE_USER:bigchat}
    password: ${DATABASE_PASSWORD:bigchat}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET:default-secret-change-in-production-at-least-32-chars}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  base-url: https://api.anthropic.com
  timeout-seconds: ${ANTHROPIC_TIMEOUT_SECONDS:10}

management:
  endpoints:
    web:
      exposure:
        include: health,info
